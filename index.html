<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Deesca — Legal &amp; Support</title>
  <meta name="description" content="Deesca: Terms of Use, Privacy Policy, and Support." />
  <style>
    :root{--bg:#F6EEE2;--surface:#FFFBF4;--text:#2C2521;--muted:#6B6258;--accent:#DA631C;--border:#E7DCC9;}
    *{box-sizing:border-box;}
    html{-webkit-text-size-adjust:100%;}
    body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.65;-webkit-font-smoothing:antialiased;}
    .site-head{display:flex;align-items:center;gap:10px;max-width:720px;margin:0 auto;padding:22px;}
    .brand{font-weight:800;letter-spacing:.5px;color:var(--accent);font-size:20px;text-decoration:none;}
    .wrap{max-width:720px;margin:0 auto;padding:8px 22px 80px;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:30px 26px;box-shadow:0 1px 2px rgba(44,37,33,.04);}
    h1{font-size:28px;margin:0 0 6px;letter-spacing:-.5px;}
    .updated{color:var(--muted);font-size:14px;margin:0 0 22px;}
    a{color:var(--accent);}
    .links{display:flex;flex-direction:column;gap:12px;margin-top:24px;}
    .links a{display:block;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;text-decoration:none;color:var(--text);font-weight:600;}
    footer{text-align:center;color:var(--muted);font-size:13px;margin-top:44px;}
  </style>
</head>
<body>
  <div class="site-head"><a class="brand" href="./">Deesca</a></div>
  <div class="wrap">
    <div class="card">
      <h1>Legal &amp; Support</h1>
      <p class="updated">Deesca — AI-assisted relationship mediation, coaching &amp; reflection.</p>
      <div class="links">
        <a href="terms/">Terms of Use (EULA) →</a>
        <a href="privacy/">Privacy Policy →</a>
        <a href="support/">Support →</a>
      </div>
    </div>
    <footer>© 2026 Deesca</footer>
  </div>
</body>
</html>
